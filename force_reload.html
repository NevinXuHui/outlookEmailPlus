<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>强制刷新测试</title>
    <script>
        // 强制刷新页面，清除缓存
        if (window.location.search.indexOf('nocache=') === -1) {
            window.location.href = window.location.pathname + '?nocache=' + Date.now();
        }
        
        // 检查 textarea 是否存在
        window.onload = function() {
            const el = document.getElementById('telegramProxyUrl');
            if (el) {
                alert('元素类型: ' + el.tagName + '\n' + 
                      '是否可多行: ' + (el.tagName === 'TEXTAREA' ? '✅ 是' : '❌ 否 (' + el.tagName + ')'));
            } else {
                alert('❌ 未找到 telegramProxyUrl 元素');
            }
        };
    </script>
</head>
<body>
    <h1>强制刷新测试</h1>
    <p>请打开设置页面，然后在浏览器控制台运行以下代码：</p>
    <pre>
// 检查元素类型
const el = document.getElementById('telegramProxyUrl');
console.log('元素类型:', el ? el.tagName : '未找到');
console.log('是否支持多行:', el && el.tagName === 'TEXTAREA');
    </pre>
</body>
</html>
